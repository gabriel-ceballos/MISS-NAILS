<script>


console.log("JS MISS NAILS CARGADO");


function activarCuenta(){

  const correo =
    document.getElementById(
      'correoActivacion'
    ).value;

  const password =
    document.getElementById(
      'password'
    ).value;

  const confirmar =
    document.getElementById(
      'confirmar'
    ).value;

  if(password !== confirmar){

    document.getElementById(
      'mensajeSistema'
    ).innerHTML =
      'Las contraseñas no coinciden.';

    return;

  }

  google.script.run

    .withSuccessHandler(function(resultado){

      document.getElementById(
        'mensajeSistema'
      ).innerHTML =
        resultado.mensaje;

    })

    .withFailureHandler(function(error){

      document.getElementById(
        'mensajeSistema'
      ).innerHTML =
        error.message;

    })

    .activarCuenta(
      correo,
      password
    );

}


function iniciarSesion(){

  const correo =
    document.getElementById(
      'correo'
    ).value;

  const password =
    document.getElementById(
      'password'
    ).value;

  google.script.run

    .withSuccessHandler(
      function(resultado){

        if(!resultado.ok){

          document
            .getElementById(
              'mensajeSistema'
            )
            .innerHTML =
              resultado.mensaje;

          return;

        }

       mostrarDashboard(
  resultado.nombre,
  resultado.rol
);

      }
    )

    .withFailureHandler(
      function(error){

        document
          .getElementById(
            'mensajeSistema'
          )
          .innerHTML =
            error.message;

      }
    )

    .validarLogin(
      correo,
      password
    );

}


function mostrarActivacion(){

  document.querySelector(
    '.tarjeta-login'
  ).innerHTML = `

    <h1>MISS NAILS</h1>

    <p>Activación de Cuenta</p>

    <hr>

    <input
      type="email"
      id="correoActivacion"
      placeholder="Correo">

    <br><br>

    <input
      type="password"
      id="password"
      placeholder="Crear contraseña">

    <br><br>

    <input
      type="password"
      id="confirmar"
      placeholder="Confirmar contraseña">

    <br><br>

    <button onclick="activarCuenta()">
      Activar Cuenta
    </button>

    <br><br>

    <a href="#"
       onclick="mostrarLogin(); return false;">
       Regresar
    </a>

    <br><br>

    <div id="mensajeSistema"></div>

  `;

}


function mostrarLogin(){

  document.querySelector(
    '.tarjeta-login'
  ).innerHTML = `

    <h1>MISS NAILS</h1>

    <p>Portal de Distribuidores</p>

    <hr>

    <input
      type="email"
      id="correo"
      placeholder="Correo">

    <br><br>

    <input
      type="password"
      id="password"
      placeholder="Contraseña">

    <br><br>

    <button onclick="iniciarSesion()">
      Ingresar
    </button>

    <br><br>

    <a href="#"
       onclick="mostrarActivacion(); return false;">
       Activar cuenta
    </a>

    <br><br>

    <div id="mensajeSistema"></div>

  `;

}

document.getElementById("app").innerHTML = `

</script>
